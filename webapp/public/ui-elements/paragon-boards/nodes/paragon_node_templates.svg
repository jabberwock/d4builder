<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Standard Paragon Node (64x64) -->
  <defs>
    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1a9b8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5d56;stop-opacity:1" />
    </radialGradient>

    <radialGradient id="glyphGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC8400;stop-opacity:1" />
    </radialGradient>

    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlowActive">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Normal Stat Node (Active) -->
  <g id="paragon-node-normal-active" transform="translate(40, 40)">
    <circle cx="0" cy="0" r="28" fill="url(#nodeGradient)" filter="url(#nodeGlowActive)"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#00FF88" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.3"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" opacity="0.8">+</text>
  </g>

  <!-- Normal Stat Node (Locked) -->
  <g id="paragon-node-normal-locked" transform="translate(150, 40)">
    <circle cx="0" cy="0" r="28" fill="#4A4A4A" filter="url(#nodeGlow)"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#808080" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#808080" stroke-width="1" opacity="0.2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#555555">🔒</text>
  </g>

  <!-- Normal Stat Node (Unselected) -->
  <g id="paragon-node-normal-inactive" transform="translate(260, 40)">
    <circle cx="0" cy="0" r="28" fill="#2a4a5a" filter="url(#nodeGlow)"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#4ECDC4" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#4ECDC4" stroke-width="0.5" opacity="0.2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#AAAAAA" opacity="0.6">+</text>
  </g>

  <!-- Glyph Socket Node (Active) -->
  <g id="paragon-glyph-active" transform="translate(40, 150)">
    <circle cx="0" cy="0" r="32" fill="url(#glyphGradient)" filter="url(#nodeGlowActive)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFFF00" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <path d="M -8,-8 L 8,-8 L 8,8 L -8,8 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000">G</text>
  </g>

  <!-- Glyph Socket Node (Locked) -->
  <g id="paragon-glyph-locked" transform="translate(150, 150)">
    <circle cx="0" cy="0" r="32" fill="#3a3a3a" filter="url(#nodeGlow)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#555555" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#555555" stroke-width="1" opacity="0.2"/>
    <path d="M -8,-8 L 8,-8 L 8,8 L -8,8 Z" fill="none" stroke="#777777" stroke-width="2" opacity="0.3"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#555555">🔒</text>
  </g>

  <!-- Glyph Socket Node (Installed) -->
  <g id="paragon-glyph-installed" transform="translate(260, 150)">
    <circle cx="0" cy="0" r="32" fill="url(#glyphGradient)" filter="url(#nodeGlow)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#FFA500" stroke-width="1" opacity="0.5"/>
    <path d="M -8,-8 L 8,-8 L 8,8 L -8,8 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000">✓</text>
  </g>

  <!-- Compass Node (Active) -->
  <g id="paragon-compass-active" transform="translate(40, 260)">
    <circle cx="0" cy="0" r="32" fill="#FF6B6B" filter="url(#nodeGlowActive)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FF3333" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#FF8888" stroke-width="1" opacity="0.4"/>
    <path d="M 0,-12 L 8,-2 L 0,6 L -8,-2 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">◉</text>
  </g>

  <!-- Compass Node (Locked) -->
  <g id="paragon-compass-locked" transform="translate(150, 260)">
    <circle cx="0" cy="0" r="32" fill="#4a3a3a" filter="url(#nodeGlow)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#664444" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#664444" stroke-width="1" opacity="0.2"/>
    <path d="M 0,-12 L 8,-2 L 0,6 L -8,-2 Z" fill="none" stroke="#777777" stroke-width="2" opacity="0.3"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">◉</text>
  </g>

  <!-- Connection Line (Active) -->
  <g id="paragon-connection-active">
    <line x1="100" y1="360" x2="300" y2="360" stroke="#00FF88" stroke-width="3" opacity="0.8"/>
    <line x1="100" y1="360" x2="300" y2="360" stroke="#00FF00" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Connection Line (Locked) -->
  <g id="paragon-connection-locked">
    <line x1="100" y1="420" x2="300" y2="420" stroke="#808080" stroke-width="3" opacity="0.4"/>
    <line x1="100" y1="420" x2="300" y2="420" stroke="#A0A0A0" stroke-width="1" opacity="0.2"/>
  </g>
</svg>
