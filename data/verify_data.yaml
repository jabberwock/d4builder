# Affix max_value from affixes table (computed at item power 800)
affixes:
  - {internal_name: CritDamage,       max_value: 21.0}
  - {internal_name: OverpowerDamage,  max_value: 63.5}
  - {internal_name: AttackSpeed,      max_value: 10.0}
  # NULL/missing entries — these reference real affixes whose internal names
  # vary across seasons. Track that they're at least PRESENT in the DB.

