# Regression test fixtures for d4_stats.db and derived JSON files.
#
# Hand-curated known-correct values. When these change, EITHER an extractor
# improved (and you should update this YAML and commit) OR something
# regressed (and you should fix the extractor before committing).
#
# Tolerances:
#   - skill_damage values: exact (DB stores them as fixed values)
#   - cooldowns: ±0.5 sec (rounding)
#   - affix max_value: ±0.5 (rounding from random ranges)
#   - passive effect values: ±0.001 (floating point)
#
# To add a new fixture: pick a value you've manually verified against
# game/maxroll, add it here, and re-run `python3 verify_data.py`.

skill_damage:
  # rank 5 damage_pct values from skill_damage table
